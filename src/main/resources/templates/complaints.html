<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Complaints Ledger | Complynt')}"></head>
<body class="bg-surface font-body text-on-surface antialiased">
    <main class="ml-64 pt-20 p-8 min-h-screen">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold font-headline tracking-tight text-on-background">Case Ledger</h1>
            <p class="text-on-surface-variant text-sm mt-1 italic opacity-80">Full administrative record of managed compliance events.</p>
        </div>

        <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 overflow-hidden">
            <!-- Filter Toolbar -->
            <div class="px-6 py-4 bg-surface-container-low/50 border-b border-outline-variant/10 flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm text-on-surface-variant">filter_list</span>
                    <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Global Filters</span>
                </div>
                
                <select id="f-status" onchange="loadList()" class="bg-surface-container border border-outline-variant/20 rounded-lg py-1.5 px-3 text-xs focus:ring-1 focus:ring-primary/20 outline-none transition-all">
                    <option value="">All Status</option><option value="OPEN">Open</option><option value="IN_PROGRESS">In Progress</option>
                    <option value="RESOLVED">Resolved</option><option value="ESCALATED">Escalated</option><option value="CLOSED">Closed</option>
                </select>

                <select id="f-product" onchange="loadList()" class="bg-surface-container border border-outline-variant/20 rounded-lg py-1.5 px-3 text-xs focus:ring-1 focus:ring-primary/20 outline-none transition-all">
                    <option value="">All Products</option><option value="CREDIT_CARD">Credit Card</option><option value="HOME_LOAN">Home Loan</option>
                    <option value="SAVINGS_ACCOUNT">Savings Account</option><option value="FIXED_DEPOSIT">Fixed Deposit</option>
                    <option value="INSURANCE">Insurance</option><option value="PERSONAL_LOAN">Personal Loan</option><option value="OTHER">Other</option>
                </select>

                <select id="f-severity" onchange="loadList()" class="bg-surface-container border border-outline-variant/20 rounded-lg py-1.5 px-3 text-xs focus:ring-1 focus:ring-primary/20 outline-none transition-all">
                    <option value="">All Severity</option><option value="P1">P1 Critical</option><option value="P2">P2 High</option>
                    <option value="P3">P3 Medium</option><option value="P4">P4 Low</option>
                </select>

                <button onclick="clearFilters()" class="text-[10px] font-bold text-primary uppercase tracking-widest hover:underline px-2">Reset</button>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-surface-container-low/30 border-b border-outline-variant/10">
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Identity</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Case Title</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Client</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Product</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Tier</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Status</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">SLA</th>
                            <th class="px-6 py-3 text-[10px] font-extrabold text-on-surface-variant uppercase tracking-widest">Filing Date</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-outline-variant/5">
                        <tr>
                            <td colspan="8" class="px-6 py-12 text-center text-on-surface-variant text-sm italic">Synchronizing with registry...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div id="paging" class="px-6 py-4 bg-surface-container-low/20 border-t border-outline-variant/10 flex items-center justify-between">
                <!-- Dynamic Content -->
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
    <script>
    initLayout('complaints');
    var curPage = 0;

    function clearFilters() { 
        document.getElementById('f-status').value=''; 
        document.getElementById('f-product').value=''; 
        document.getElementById('f-severity').value=''; 
        loadList(); 
    }

    async function loadList(page) {
        curPage = page || 0;
        var tbody = document.getElementById('tbody');
        tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center"><div class="animate-spin inline-block h-6 w-6 border-2 border-primary border-b-transparent rounded-full mb-2"></div><p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Accessing Data...</p></td></tr>';
        
        try {
            var data = await api.getComplaints({ 
                page: curPage, size: 12,
                status: document.getElementById('f-status').value,
                productType: document.getElementById('f-product').value,
                severity: document.getElementById('f-severity').value 
            });
            
            var list = data.content || [];
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-on-surface-variant italic">No matched records found in current view.</td></tr>';
            } else {
                tbody.innerHTML = list.map(function(c) {
                    return `
                        <tr onclick="window.location.href='/complaint-detail?id=${c.id}'" class="hover:bg-primary/[0.02] cursor-pointer transition-colors group">
                            <td class="px-6 py-4">
                                <span class="data-font text-[10px] font-bold text-primary px-2 py-0.5 bg-primary/5 rounded border border-primary/10 group-hover:bg-primary group-hover:text-white transition-all whitespace-nowrap">#${c.ticketNumber || 'N/A'}</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-on-surface text-sm tracking-tight">${c.title || 'Untitled Case'}</div>
                                <div class="text-[10px] text-on-surface-variant/70 uppercase font-mono">${c.channel || 'DIRECT'}</div>
                            </td>
                            <td class="px-6 py-4 text-sm text-on-surface font-medium">${c.clientDisplayName || (c.customer && c.customer.fullName) || 'Anonymous'}</td>
                            <td class="px-6 py-4 text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">${productLabel(c.productType)}</td>
                            <td class="px-6 py-4">${severityBadge(c.severity)}</td>
                            <td class="px-6 py-4">${statusBadge(c.status)}</td>
                            <td class="px-6 py-4">${slaBadge(c.slaStatus)}</td>
                            <td class="px-6 py-4 text-[10px] text-on-surface-variant font-bold font-mono">${formatDateShort(c.createdAt)}</td>
                        </tr>
                    `;
                }).join('');
            }

            // Pagination Render
            var tp = data.totalPages || 0;
            var pg = document.getElementById('paging');
            if (tp <= 1) { 
                pg.innerHTML = '<span class="text-[10px] font-bold text-on-surface-variant/50 uppercase tracking-widest">End of Record</span>'; 
                return; 
            }
            
            pg.innerHTML = `
                <button ${curPage === 0 ? 'disabled' : ''} onclick="loadList(${curPage - 1})" class="px-4 py-1.5 rounded-lg border border-outline-variant/30 text-[10px] font-bold uppercase tracking-widest hover:bg-surface-container disabled:opacity-30 transition-all flex items-center gap-1">
                    <span class="material-symbols-outlined text-xs">chevron_left</span> Previous
                </button>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Entry Group ${curPage + 1} of ${tp}</span>
                <button ${curPage >= tp - 1 ? 'disabled' : ''} onclick="loadList(${curPage + 1})" class="px-4 py-1.5 rounded-lg border border-outline-variant/30 text-[10px] font-bold uppercase tracking-widest hover:bg-surface-container disabled:opacity-30 transition-all flex items-center gap-1">
                    Next <span class="material-symbols-outlined text-xs">chevron_right</span>
                </button>
            `;
        } catch (err) { 
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-error font-bold uppercase tracking-widest text-xs">Synchronizer Error: ${err.message}</td></tr>`; 
        }
    }

    loadList();
    </script>
</body>
</html>
