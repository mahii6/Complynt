<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Complynt - Executive Dashboard')}"></head>
<body class="bg-surface font-body text-on-surface">
    <main class="ml-64 pt-20 p-8 min-h-screen">
        <div id="dashboard-body">
            <div class="flex items-center justify-center h-[50vh]">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
                <span class="ml-4 text-on-surface-variant font-bold uppercase tracking-widest text-sm">Initializing Module...</span>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
    <script>
    initLayout('dashboard');

    async function loadDashboard() {
        var el = document.getElementById('dashboard-body');
        try {
            var results = await Promise.all([api.getSummary(), api.getTrend(7), api.getComplaints({ size: 3 })]);
            var summary = results[0], trend = results[1], complaints = results[2];

            el.innerHTML = `
                <!-- KPI Row: Bento Style -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    ${kpiCard('Risk Score', summary.breachedSlaCount > 0 ? '84.2' : '15.4', 'analytics', summary.breachedSlaCount > 0 ? '+2.4%' : '-1.2%', summary.breachedSlaCount > 0 ? 'text-error' : 'text-emerald-600', 'trending_up')}
                    ${kpiCard('Active Complaints', summary.openCount + summary.inProgressCount, 'rule', summary.openCount + ' awaiting action', 'text-primary', 'check_circle')}
                    ${kpiCard('Resolved (Total)', summary.resolvedCount, 'bolt', 'Life-time resolution', 'text-secondary', 'schedule')}
                    ${kpiCard('Critical Items', summary.escalatedCount, 'report_problem', summary.escalatedCount + ' urgent priority', 'text-tertiary', 'priority_high')}
                </div>

                <!-- Middle Section: Asymmetric Layout -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                    <!-- Active Complaints Table (Wide) -->
                    <div class="lg:col-span-2 bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_12px_40px_rgba(0,88,194,0.04)]">
                        <div class="px-6 py-4 flex justify-between items-center bg-surface-container-low/50">
                            <h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Active Complaints</h2>
                            <button class="text-xs font-bold text-primary flex items-center gap-1 hover:underline" onclick="window.location.href='/complaints'">
                                VIEW ALL <span class="material-symbols-outlined text-xs">arrow_forward</span>
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="border-b border-surface-container text-[11px] uppercase tracking-tighter text-on-surface-variant font-bold font-mono">
                                        <th class="px-6 py-4">ID</th>
                                        <th class="px-6 py-4">Entity / Product</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-right">Severity</th>
                                    </tr>
                                </thead>
                                <tbody class="text-sm">
                                    ${(complaints.content || []).map(c => `
                                        <tr class="group hover:bg-primary/5 transition-colors cursor-pointer border-t border-surface-container/30" onclick="window.location.href='/complaint-detail?id=${c.id}'">
                                            <td class="px-6 py-4 font-mono font-semibold text-primary">${c.ticketNumber}</td>
                                            <td class="px-6 py-4">
                                                <div class="flex flex-col">
                                                    <span class="font-bold text-on-surface">${c.title}</span>
                                                    <span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tight">${productLabel(c.productType)}</span>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">${statusBadge(c.status)}</td>
                                            <td class="px-6 py-4 text-right">${severityBadge(c.severity)}</td>
                                        </tr>
                                    `).join('') || `<tr><td colspan="4" class="p-8 text-center text-on-surface-variant italic">No active complaints found.</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Resolution Velocity Bar Chart (Narrow) -->
                    <div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_12px_40px_rgba(0,88,194,0.04)] flex flex-col">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant mb-6">Complaint Trend</h2>
                        <div id="chart-trend" class="flex-1"></div>
                        <div class="mt-4 pt-4 border-t border-surface-container flex justify-between items-center">
                            <span class="text-xs font-medium text-on-surface-variant">Avg Turnaround</span>
                            <span class="text-sm font-bold data-font text-primary">4.2 Days</span>
                        </div>
                    </div>
                </div>

                <!-- Bottom Section: Contextual Panel -->
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <!-- Security Context Panel -->
                    <div class="lg:col-span-3 bg-surface-container-lowest rounded-xl p-6 shadow-[0_12px_40px_rgba(0,88,194,0.04)]">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="p-2 bg-primary-container/10 rounded-lg text-primary">
                                <span class="material-symbols-outlined">shield_person</span>
                            </div>
                            <div>
                                <h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant leading-none">Intelligence Summary</h2>
                                <p class="text-xs text-on-surface-variant mt-1">Automated analysis of current system state</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${statsMiniCard('SLA Health', summary.breachedSlaCount > 0 ? 'CRITICAL' : 'OPTIMAL', 'vpn_key', summary.breachedSlaCount > 0 ? 'text-error' : 'text-primary')}
                            ${statsMiniCard('Network Load', 'STABLE', 'language', 'text-tertiary')}
                            ${statsMiniCard('Auth Status', 'SECURE', 'lock_person', 'text-primary')}
                        </div>
                    </div>
                    <!-- Quick Action Cards -->
                    <div class="flex flex-col gap-4">
                        <button class="flex-1 p-4 rounded-xl border border-primary/20 hover:bg-primary/5 transition-all flex flex-col justify-center items-center text-center group" onclick="window.location.href='/sla'">
                            <span class="material-symbols-outlined text-primary mb-2 text-3xl group-hover:scale-110 transition-transform">monitoring</span>
                            <span class="text-sm font-bold text-on-surface">Monitor SLAs</span>
                        </button>
                        <button class="flex-1 p-4 rounded-xl border border-primary/20 hover:bg-primary/5 transition-all flex flex-col justify-center items-center text-center group" onclick="window.location.href='/reports'">
                            <span class="material-symbols-outlined text-primary mb-2 text-3xl group-hover:scale-110 transition-transform">mail_lock</span>
                            <span class="text-sm font-bold text-on-surface">Generate Reports</span>
                        </button>
                    </div>
                </div>
            `;

            if (trend && trend.length) {
                var td = {}; trend.forEach(function(t) { td[t.date] = t.count; });
                renderBarChart('chart-trend', td, ['#0070f2']);
            } else {
                document.getElementById('chart-trend').innerHTML = '<div class="flex items-center justify-center h-full text-on-surface-variant italic text-xs">No trend data available.</div>';
            }
        } catch (err) {
            el.innerHTML = `
                <div class="bg-error/5 border border-error/20 p-8 rounded-xl text-center">
                    <span class="material-symbols-outlined text-error text-4xl mb-4">error</span>
                    <h3 class="text-error font-bold mb-2">Systems Unreachable</h3>
                    <p class="text-on-surface-variant text-sm">${err.message}</p>
                </div>
            `;
        }
    }

    function kpiCard(label, value, icon, sub, subColor, trendIcon) {
        return `
            <div class="bg-surface-container-lowest p-5 rounded-xl shadow-[0_12px_40px_rgba(0,88,194,0.04)] flex flex-col justify-between border border-white hover:border-primary/20 transition-all group">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">${label}</p>
                        <h3 class="text-3xl font-extrabold text-on-surface mt-1 data-font group-hover:text-primary transition-colors">${value}</h3>
                    </div>
                    <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary group-hover:primary-gradient group-hover:text-white transition-all">
                        <span class="material-symbols-outlined text-xl">${icon}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-[10px] font-bold ${subColor} uppercase tracking-tighter">
                    <span class="material-symbols-outlined text-xs">${trendIcon}</span>
                    <span>${sub}</span>
                </div>
            </div>
        `;
    }

    function statsMiniCard(label, value, icon, colorClass) {
        return `
            <div class="p-4 rounded-lg bg-surface border border-outline-variant/15 flex flex-col gap-2">
                <div class="flex items-center gap-2 ${colorClass}">
                    <span class="material-symbols-outlined text-sm font-bold">${icon}</span>
                    <span class="text-[9px] font-bold uppercase tracking-widest">${label}</span>
                </div>
                <div class="flex items-baseline gap-2">
                    <span class="text-lg font-extrabold data-font text-on-surface">${value}</span>
                </div>
            </div>
        `;
    }

    loadDashboard();
    </script>
</body>
</html>
