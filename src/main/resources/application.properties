spring.application.name=Complynt

app.notifications.fallback-customer-email=${FALLBACK_EMAIL}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

server.address=0.0.0.0
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.ai-service-url=${AI_SERVICE_URL}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.groq.api-key=${GROQ_API_KEY}
app.groq.model=llama-3.3-70b-versatile
app.ai.confidence-threshold=0.60

app.twilio.account-sid=${TWILIO_SID}
app.twilio.auth-token=${TWILIO_AUTH}
app.twilio.whatsapp-from=${TWILIO_FROM}